services:
  yamtrack:
    container_name: yamtrack
    image: ghcr.io/fuzzygrim/yamtrack:0.25.3
    restart: unless-stopped
    depends_on:
      - redis
    env_file: .env
    environment:
      - TZ=America/Los_Angeles
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./db:/yamtrack/db
    ports:
      - "8000:8000"

  redis:
    container_name: yamtrack-redis
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # "Watch Next" companion app — reads Yamtrack's SQLite DB directly to show
  # aired-but-unwatched episodes. See watchnext/ and README.md.
  watchnext:
    container_name: yamtrack-watchnext
    build: ./watchnext
    restart: unless-stopped
    # Optional — supplies TMDB_API for episode-title lookups. The app runs fine
    # without it (plain SxxExx labels), so the file isn't required to exist.
    env_file:
      - path: watchnext/.env
        required: false
    # Match Yamtrack's timezone so a "mark watched" records the correct local
    # time (episode_save stores the datetime we send as now).
    environment:
      - TZ=America/Los_Angeles
    # Yamtrack's DB is WAL mode, so this is mounted read/write (a reader must be
    # able to update the -shm/-wal sidecars); write protection is enforced
    # in-process via PRAGMA query_only. Runs as 1000:1000 — the uid/gid that
    # owns the DB files — so it can touch those sidecars.
    user: "1000:1000"
    volumes:
      - ./db:/yamtrack/db
    ports:
      - "8090:8090"

volumes:
  redis_data:
